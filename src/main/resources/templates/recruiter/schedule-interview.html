<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Schedule Interview - JobPortal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --green-deep: #04342C;
            --green-mid: #0F6E56;
            --green-accent: #1D9E75;
            --surface: #F7F6F3;
            --card: #FFFFFF;
            --text-primary: #1A1A18;
            --text-muted: #6B6B67;
            --border: rgba(0,0,0,0.10);
            --radius: 10px;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--surface); padding: 2rem; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: var(--card); border-radius: var(--radius); padding: 2rem; }
        h1 { font-family: 'Playfair Display', serif; color: var(--green-deep); margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: var(--green-accent); }
        .btn { padding: 12px 28px; background: var(--green-accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn:hover { background: var(--green-mid); }
        .back-link { color: var(--green-accent); text-decoration: none; display: inline-block; margin-bottom: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <a th:href="@{/JobPortal/recruiter/manage-jobs}" class="back-link">← Back</a>
    <div class="card">
        <h1>Schedule Interview</h1>
        <p style="margin-bottom: 1rem; color: var(--text-muted);">
            Applicant: <strong th:text="${application.seeker?.user?.name}"></strong>
        </p>

        <form th:action="@{/JobPortal/recruiter/job/{applicationId}/schedule-interview(applicationId=${currentApplicationId})}" method="post">
            <div class="form-group">
                <label>Interview Date & Time *</label>
                <input type="datetime-local" name="interviewDate" required/>
            </div>
            <div class="form-group">
                <label>Interview Location *</label>
                <input type="text" name="interviewLocation" placeholder="e.g. Google Meet, Zoom, Office Address" required/>
            </div>
            <div class="form-group">
                <label>Interview Notes (Optional)</label>
                <textarea name="interviewNotes" rows="4" placeholder="Additional instructions for the candidate..."></textarea>
            </div>
            <button type="submit" class="btn">Send Interview Invitation</button>
        </form>
    </div>
</div>
</body>
</html>
