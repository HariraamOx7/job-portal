
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Manage Jobs – JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green-deep: #04342C; --green-mid: #0F6E56; --green-accent: #1D9E75;
            --green-light: #9FE1CB; --surface: #F7F6F3; --card: #FFFFFF;
            --text-primary: #1A1A18; --text-muted: #6B6B67; --border: rgba(0,0,0,0.10); --radius: 10px;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text-primary); }
        .navbar { position: sticky; top: 0; z-index: 100; background: var(--green-deep); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 58px; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
        .brand { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: #fff; text-decoration: none; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 14px; transition: color 0.15s; }
        .nav-links a:hover { color: #fff; }
        .nav-logout { background: rgba(255,255,255,0.12); padding: 6px 14px; border-radius: 6px; }
        .nav-logout:hover { background: rgba(255,255,255,0.22) !important; }
        .container { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; }
        .page-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--green-deep); margin-bottom: 1.5rem; }
        .table-wrap { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--green-deep); color: #fff; padding: 12px 16px; font-size: 13px; font-weight: 500; text-align: left; }
        td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f0faf6; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-open { background: #d1fae5; color: #065f46; }
        .badge-closed { background: #fee2e2; color: #991b1b; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .link-btn { color: var(--green-accent); text-decoration: none; font-size: 13px; }
        .link-btn:hover { text-decoration: underline; }
        .btn-sm { display: inline-block; padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: 500; border: none; cursor: pointer; text-decoration: none; }
        .btn-edit { background: var(--green-light); color: var(--green-deep); }
        .btn-close-job { background: #fee2e2; color: #991b1b; }
        .btn-delete { background: #dc2626; color: #fff; }
        .btn-delete:hover { background: #b91c1c; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .btn { display: inline-block; padding: 9px 22px; border-radius: 7px; font-size: 14px; font-weight: 500; text-decoration: none; cursor: pointer; border: none; }
        .btn-primary { background: var(--green-accent); color: #fff; }
        .btn-primary:hover { background: var(--green-mid); }
    </style>
</head>
<body>
<nav class="navbar">
    <a class="brand" th:href="@{/JobPortal/recruiter/home}">JobPortal</a>
    <div class="nav-links">
        <a th:href="@{/JobPortal/recruiter/home}">Dashboard</a>
        <a th:href="@{/JobPortal/recruiter/post-job}">Post Job</a>
        <a th:href="@{/JobPortal/recruiter/manage-jobs}">Manage Jobs</a>
        <a th:href="@{/JobPortal/login}" class="nav-logout">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="header-row">
        <h1 class="page-title" style="margin-bottom:0;">Manage Jobs</h1>
        <a th:href="@{/JobPortal/recruiter/post-job}" class="btn btn-primary">+ Post New Job</a>
    </div>
    <div class="table-wrap" th:if="${!jobs.isEmpty()}">
        <table>
            <thead>
            <tr>
                <th>Title</th>
                <th>Location</th>
                <th>Type</th>
                <th>Status</th>
                <th>Posted</th>
                <th>Applicants</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="job : ${jobs}">
                <td th:text="${job.title}">Title</td>
                <td th:text="${job.location}">Location</td>
                <td th:text="${job.jobType}">Type</td>
                <td>
                    <span class="badge badge-open" th:if="${job.status == 'OPEN'}">Open</span>
                    <span class="badge badge-closed" th:unless="${job.status == 'OPEN'}">Closed</span>
                </td>
                <td th:text="${#temporals.format(job.postedAt, 'yyyy-MM-dd')}">Date</td>
                <td th:text="${applicantCounts[job.id]}">0</td>
                <td>
                    <div class="actions">
                        <!-- View Applicants -->
                        <a th:href="@{/JobPortal/recruiter/job/{id}/applicants(id=${job.id})}" class="link-btn">Applicants</a>
                        <!-- Edit Job (always visible) -->
                        <a th:href="@{/JobPortal/recruiter/job/{id}/edit(id=${job.id})}" class="btn-sm btn-edit">Edit</a>

                        <!-- Close button (visible only when job is OPEN) -->
                        <form th:if="${job.status == 'OPEN'}"
                              th:action="@{/JobPortal/recruiter/job/{id}/close(id=${job.id})}"
                              method="post" style="display:inline;">
                            <button type="submit" class="btn-sm btn-close-job">Close</button>
                        </form>

                        <!-- Delete button (visible only when job is CLOSED) -->
                        <form th:if="${job.status == 'CLOSED'}"
                              th:action="@{/JobPortal/recruiter/job/{id}/delete(id=${job.id})}"
                              method="post" style="display:inline;">
                            <button type="submit" class="btn-sm btn-delete"
                                    onclick="return confirm('⚠️ Are you sure you want to permanently delete this job and all its applications? This action cannot be undone.')">
                                Delete
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="empty-state" th:if="${jobs.isEmpty()}">
        <p>No jobs posted yet. <a th:href="@{/JobPortal/recruiter/post-job}" class="link-btn">Post your first job</a></p>
    </div>
</div>
</body>
</html>
