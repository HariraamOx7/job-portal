<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Recruiter Dashboard – JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green-deep: #04342C;
            --green-mid: #0F6E56;
            --green-accent: #1D9E75;
            --green-light: #9FE1CB;
            --surface: #F7F6F3;
            --card: #FFFFFF;
            --text-primary: #1A1A18;
            --text-muted: #6B6B67;
            --border: rgba(0,0,0,0.10);
            --radius: 10px;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text-primary); }
        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: var(--green-deep);
            padding: 0 2rem;
            display: flex; align-items: center; justify-content: space-between;
            height: 58px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
        }
        .brand { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: #fff; text-decoration: none; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 14px; font-weight: 400; transition: color 0.15s; }
        .nav-links a:hover { color: #fff; }
        .nav-logout { background: rgba(255,255,255,0.12); padding: 6px 14px; border-radius: 6px; }
        .nav-logout:hover { background: rgba(255,255,255,0.22) !important; }
        .container { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; }
        .welcome-section { margin-bottom: 2rem; }
        .welcome-section h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--green-deep); }
        .welcome-section p { color: var(--text-muted); margin-top: 0.4rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.2rem; margin-bottom: 2.5rem; }
        .stat-card { background: var(--card); border-radius: var(--radius); padding: 1.5rem; border: 1px solid var(--border); text-align: center; }
        .stat-number { font-size: 2.4rem; font-weight: 700; color: var(--green-accent); }
        .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 0.3rem; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
        .section-header h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--green-deep); }
        .btn { display: inline-block; padding: 9px 22px; border-radius: 7px; font-size: 14px; font-weight: 500; text-decoration: none; cursor: pointer; border: none; transition: background 0.15s; }
        .btn-primary { background: var(--green-accent); color: #fff; }
        .btn-primary:hover { background: var(--green-mid); }
        .table-wrap { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--green-deep); color: #fff; padding: 12px 16px; font-size: 13px; font-weight: 500; text-align: left; }
        td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f0faf6; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-open { background: #d1fae5; color: #065f46; }
        .badge-closed { background: #fee2e2; color: #991b1b; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
        .link-btn { color: var(--green-accent); text-decoration: none; font-size: 14px; }
        .link-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>
<nav class="navbar">
    <a class="brand" th:href="@{/JobPortal/recruiter/home}">JobPortal</a>
    <div class="nav-links">
        <a th:href="@{/JobPortal/recruiter/home}">Dashboard</a>
        <a th:href="@{/JobPortal/recruiter/post-job}">Post Job</a>
        <a th:href="@{/JobPortal/recruiter/manage-jobs}">Manage Jobs</a>
        <a th:href="@{/JobPortal/login}" class="nav-logout">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="welcome-section">
        <h1>Welcome back, <span th:text="${recruiter.user.name}">Recruiter</span>!</h1>
        <p th:text="${recruiter.companyName}">Company Name</p>
    </div>
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" th:text="${totalJobs}">0</div>
            <div class="stat-label">Total Jobs Posted</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" th:text="${totalApplicants}">0</div>
            <div class="stat-label">Total Applicants</div>
        </div>
    </div>
    <div class="section-header">
        <h2>Recent Jobs</h2>
        <a th:href="@{/JobPortal/recruiter/post-job}" class="btn btn-primary">+ Post New Job</a>
    </div>
    <div class="table-wrap" th:if="${!jobs.isEmpty()}">
        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Location</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="job : ${jobs}">
                    <td th:text="${job.title}">Title</td>
                    <td th:text="${job.location}">Location</td>
                    <td th:text="${job.jobType}">Type</td>
                    <td>
                        <span class="badge badge-open" th:if="${job.status == 'OPEN'}">Open</span>
                        <span class="badge badge-closed" th:unless="${job.status == 'OPEN'}">Closed</span>
                    </td>
                    <td>
                        <a th:href="@{/JobPortal/recruiter/job/{id}/applicants(id=${job.id})}" class="link-btn">View Applicants</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="empty-state" th:if="${jobs.isEmpty()}">
        <p>No jobs posted yet. <a th:href="@{/JobPortal/recruiter/post-job}" class="link-btn">Post your first job</a></p>
    </div>
</div>
</body>
</html>
