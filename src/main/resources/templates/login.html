<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In — JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green-deep:   #04342C;
            --green-mid:    #0F6E56;
            --green-accent: #1D9E75;
            --green-light:  #9FE1CB;
            --red-bg:       #FCEBEB;
            --red-border:   #F09595;
            --red-text:     #A32D2D;
            --surface:      #F7F6F3;
            --card:         #FFFFFF;
            --text-primary: #1A1A18;
            --text-muted:   #6B6B67;
            --border:       rgba(0,0,0,0.10);
            --radius:       10px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(29,158,117,0.07) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(4,52,44,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            width: 100%;
            max-width: 900px;
            min-height: 540px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(4,52,44,0.14), 0 4px 12px rgba(0,0,0,0.06);
            animation: rise 0.45s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        
        .panel {
            width: 42%;
            background: linear-gradient(155deg, var(--green-deep) 0%, var(--green-mid) 55%, var(--green-accent) 100%);
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: -70px; right: -70px;
            width: 240px; height: 240px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .panel::after {
            content: '';
            position: absolute;
            bottom: -90px; left: -50px;
            width: 300px; height: 300px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .brand-eyebrow {
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.55);
            font-weight: 500;
            margin-bottom: 6px;
        }
        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            font-weight: 700;
            color: #fff;
            line-height: 1.15;
        }

        .panel-tagline {
            font-size: 14px;
            color: rgba(255,255,255,0.62);
            line-height: 1.75;
            font-weight: 300;
        }

        .panel-footer {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .panel-nav {
            display: flex;
            gap: 8px;
        }
        .panel-nav a {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: color 0.15s;
        }
        .panel-nav a:hover { color: #fff; }
        .panel-nav span { color: rgba(255,255,255,0.2); font-size: 12px; }
        .panel-dots { display: flex; gap: 7px; align-items: center; }
        .panel-dots span {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            display: inline-block;
        }
        .panel-dots span.active {
            width: 22px; border-radius: 4px; background: #fff;
        }

       
        .form-side {
            flex: 1;
            background: var(--card);
            padding: 3rem 3.25rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-heading { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
        .form-sub     { font-size: 13.5px; color: var(--text-muted); margin-bottom: 2rem; }

        .alert-error {
            background: var(--red-bg);
            border: 1px solid var(--red-border);
            color: var(--red-text);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-error::before {
            content: '';
            display: inline-block;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--red-text);
            flex-shrink: 0;
        }

        .field { margin-bottom: 1rem; }
        .field label {
            display: block;
            font-size: 11.5px;
            font-weight: 500;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            padding: 10px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            background: #FAFAF8;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .field input:focus {
            border-color: var(--green-accent);
            box-shadow: 0 0 0 3px rgba(29,158,117,0.13);
            background: #fff;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            margin-top: 1.5rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 14.5px;
            font-weight: 500;
            letter-spacing: 0.04em;
            color: #fff;
            background: var(--green-accent);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        .btn-submit:hover  { background: var(--green-mid); }
        .btn-submit:active { transform: scale(0.99); }

        .switch-text {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 1.25rem;
        }
        .switch-text a {
            color: var(--green-accent);
            font-weight: 500;
            text-decoration: none;
        }
        .switch-text a:hover { text-decoration: underline; }

        @media (max-width: 640px) {
            .panel { display: none; }
            .form-side { padding: 2.5rem 1.75rem; }
        }
    </style>
</head>
<body>

<div class="wrapper">

  
    <div class="panel">
        <div>
            <p class="brand-eyebrow">Welcome to</p>
            <h1 class="brand-name">Job<br/>Portal</h1>
        </div>
        <p class="panel-tagline">
            Sign in to access thousands of job opportunities and connect with top recruiters across industries.
        </p>
        <div class="panel-footer">
            <nav class="panel-nav">
                <a th:href="@{/JobPortal/login}">Sign In</a>
                <span>·</span>
                <a th:href="@{/JobPortal/register}">Register</a>
            </nav>
            <div class="panel-dots">
                <span class="active"></span>
                <span></span>
            </div>
        </div>
    </div>

  
    <div class="form-side">
        <h2 class="form-heading">Welcome back</h2>
        <p class="form-sub">Enter your credentials to continue</p>

      
        <div class="alert-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/JobPortal/login}" method="post">

            <div class="field">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email"
                       placeholder="you@example.com"
                       autocomplete="email"
                       required />
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="••••••••"
                       autocomplete="current-password"
                       required />
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <p class="switch-text">
            Don't have an account?
            <a th:href="@{/JobPortal/register}">Create one</a>
        </p>
    </div>

</div>

</body>
</html>
