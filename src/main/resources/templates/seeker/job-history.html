<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>My Applications – JobPortal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green-deep: #04342C; --green-mid: #0F6E56; --green-accent: #1D9E75;
            --green-light: #9FE1CB; --surface: #F7F6F3; --card: #FFFFFF;
            --text-primary: #1A1A18; --text-muted: #6B6B67; --border: rgba(0,0,0,0.10); --radius: 10px;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text-primary); }
        .navbar { position: sticky; top: 0; z-index: 100; background: var(--green-deep); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 58px; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
        .brand { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: #fff; text-decoration: none; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 14px; transition: color 0.15s; }
        .nav-links a:hover { color: #fff; }
        .nav-logout { background: rgba(255,255,255,0.12); padding: 6px 14px; border-radius: 6px; }
        .nav-logout:hover { background: rgba(255,255,255,0.22) !important; }
        .container { max-width: 960px; margin: 0 auto; padding: 2.5rem 1.5rem; }
        .page-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--green-deep); margin-bottom: 1.5rem; }
        .table-wrap { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--green-deep); color: #fff; padding: 12px 16px; font-size: 13px; font-weight: 500; text-align: left; }
        td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f0faf6; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-applied { background: #e0f2fe; color: #0369a1; }
        .badge-offered { background: #fef3c7; color: #92400e; }
        .badge-accepted { background: #d1fae5; color: #065f46; }
        .badge-rejected { background: #fee2e2; color: #991b1b; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
        .link-btn { color: var(--green-accent); text-decoration: none; font-size: 14px; }
        .link-btn:hover { text-decoration: underline; }
        .rejection-reason { font-size: 12px; color: #991b1b; margin-top: 4px; }
    </style>
</head>
<body>
<nav class="navbar">
    <a class="brand" th:href="@{/JobPortal/seeker/home}">JobPortal</a>
    <div class="nav-links">
        <a th:href="@{/JobPortal/seeker/home}">Browse Jobs</a>
        <a th:href="@{/JobPortal/seeker/job-history}">My Applications</a>
        <a th:href="@{/JobPortal/seeker/profile}">My Profile</a>
        <a th:href="@{/JobPortal/login}" class="nav-logout">Logout</a>
    </div>
</nav>
<div class="container">
    <h1 class="page-title">My Applications</h1>
    <div class="table-wrap" th:if="${!applications.isEmpty()}">
        <table>
            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Location</th>
                    <th>Applied On</th>
                    <th>Status</th>
                    <th>View</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="app : ${applications}">
                    <td th:text="${app.job.title}">Title</td>
                    <td th:text="${app.job.company}">Company</td>
                    <td th:text="${app.job.location}">Location</td>
                    <td th:text="${#temporals.format(app.appliedAt, 'yyyy-MM-dd')}">Date</td>
                    <td>
                        <span class="badge badge-applied" th:if="${app.status.name() == 'APPLIED'}">Applied</span>
                        <span class="badge badge-offered" th:if="${app.status.name() == 'OFFERED'}">Offered</span>
                        <span class="badge badge-accepted" th:if="${app.status.name() == 'ACCEPTED'}">Accepted</span>
                        <span class="badge badge-rejected" th:if="${app.status.name() == 'REJECTED'}">Rejected</span>
                        <div class="rejection-reason"
                             th:if="${app.status.name() == 'REJECTED' and app.rejectionReason != null and !app.rejectionReason.isEmpty()}"
                             th:text="${'Reason: ' + app.rejectionReason}">reason</div>
                    </td>
                    <td>
                        <a th:href="@{/JobPortal/seeker/job/{id}(id=${app.job.id})}" class="link-btn">View Job</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="empty-state" th:if="${applications.isEmpty()}">
        <p>You haven't applied to any jobs yet. <a th:href="@{/JobPortal/seeker/home}" class="link-btn">Browse Jobs</a></p>
    </div>
</div>
</body>
</html>
